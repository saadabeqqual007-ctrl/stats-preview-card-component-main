            <div class="data">
              <div class="data-content">314</div>

            </div>

            <div class="data">
              <div class="data-content">12m+</div>

        <div class="image">
          <img class="main-image" src="images/image-header-desktop.jpg" alt="Three women in what looks like a modern office/co-working space">

        </div>
      </div>
